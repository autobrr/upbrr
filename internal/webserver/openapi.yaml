        post:
            operationId: bootstrapAuth
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/webserver_apiAuthCredentialsRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/webserver_apiAuthStatusResponse'
                    description: OK
                default:
                    $ref: '#/components/responses/DefaultError'
            summary: Create initial REST auth
            tags:
                - auth
    /api/v1/auth/browse-policy:
        put:
            operationId: saveBrowsePolicy
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/webserver_apiBrowsePolicyRequest'
                required: true
            responses:
                "200":
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/webserver_apiAuthStatusResponse'
                    description: OK
                "401":
                    $ref: '#/components/responses/Unauthorized'
                default:
                    $ref: '#/components/responses/DefaultError'
            security:
                - bearerAuth: []
            summary: Save web browse policy
            tags:
                - auth
    /api/v1/auth/logout:
        post:
