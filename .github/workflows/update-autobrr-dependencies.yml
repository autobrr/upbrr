name: update-autobrr-dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '23 7 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-autobrr-dependencies
  cancel-in-progress: false

env:
  UPDATE_BRANCH_PREFIX: deps/autobrr-go-modules

jobs:
  update:
    name: Update autobrr Go modules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check for existing update PR
        id: existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing_pr="$(
            gh pr list \
              --state open \
              --limit 100 \
              --json number,headRefName \
              --jq ".[] | select(.headRefName | startswith(\"${UPDATE_BRANCH_PREFIX}\")) | .number" \
            | head -n 1
          )"

          if [ -n "$existing_pr" ]; then
            echo "Existing autobrr dependency update PR: #${existing_pr}"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update dependencies
        id: update
        if: steps.existing_pr.outputs.found != 'true'
        run: |
          set -euo pipefail

          branch="${UPDATE_BRANCH_PREFIX}-${GITHUB_RUN_ID}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$branch"

          go get \
            github.com/autobrr/go-bdinfo@latest \
            github.com/autobrr/go-mediainfo@latest \
            github.com/autobrr/go-qbittorrent@latest \
            github.com/autobrr/mkbrr@latest

          rls_version="$(
            git ls-remote --tags --refs https://github.com/autobrr/rls.git 'v*' \
              | sed -E 's#.*refs/tags/##' \
              | sort -V \
              | tail -n 1
          )"

          if [ -z "$rls_version" ]; then
            echo "No github.com/autobrr/rls release tags found" >&2
            exit 1
          fi

          go mod edit -replace="github.com/moistari/rls=github.com/autobrr/rls@${rls_version}"
          go mod tidy

          if git diff --quiet -- go.mod go.sum; then
            echo "No autobrr dependency updates found"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff -- go.mod go.sum
          git add go.mod go.sum
          git commit -m "chore(deps): update autobrr Go modules"
          git push --set-upstream origin "$branch"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.update.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          body_file="$(mktemp)"
          cat > "$body_file" <<'BODY'
          Updates autobrr Go modules to latest available versions:

          - github.com/autobrr/go-bdinfo
          - github.com/autobrr/go-mediainfo
          - github.com/autobrr/go-qbittorrent
          - github.com/autobrr/mkbrr
          - github.com/autobrr/rls

          Generated by the update-autobrr-dependencies workflow.
          BODY

          gh pr create \
            --head "${{ steps.update.outputs.branch }}" \
            --title "chore(deps): update autobrr Go modules" \
            --body-file "$body_file"
