name: checks

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Go tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test -race -v -timeout 20m ./...

  test-frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.27.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: webui/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: webui
        run: pnpm install --frozen-lockfile

      # Prettier keeps its own per-file cache keyed on Prettier's version and the
      # effective config, so the Actions cache key only needs to change when one of
      # those changes. Hashing the config files (not source) keeps the key stable
      # across PRs, giving a high hit rate on the primary key.
      - name: Restore Prettier cache
        id: prettier-cache
        uses: actions/cache/restore@v4
        with:
          path: webui/node_modules/.cache/prettier
          key: prettier-${{ runner.os }}-${{ hashFiles('webui/package.json', 'webui/pnpm-lock.yaml', 'webui/.prettierrc*', 'webui/prettier.config.*') }}
          restore-keys: |
            prettier-${{ runner.os }}-

      - name: Run frontend lint
        working-directory: webui
        run: pnpm run lint

      - name: Run frontend dead-code lint
        working-directory: webui
        run: pnpm run lint:dead

      - name: Run frontend typecheck
        working-directory: webui
        run: pnpm run typecheck

      - name: Run frontend unit tests
        working-directory: webui
        run: pnpm run test:unit

      - name: Check frontend formatting
        working-directory: webui
        run: pnpm run format:check

      # Save only when the primary key wasn't an exact restore-hit so we don't retry
      # writing to an existing cache entry (no-op warning). `always()` lets the cache
      # persist even when `format:check` found diffs — the cache contents are valid
      # regardless of pass/fail. This follows the documented split-restore/save pattern
      # in actions/cache's README.
      - name: Save Prettier cache
        if: always() && steps.prettier-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: webui/node_modules/.cache/prettier
          key: ${{ steps.prettier-cache.outputs.cache-primary-key }}
