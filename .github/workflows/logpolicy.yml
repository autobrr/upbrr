name: logpolicy

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: logpolicy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  logpolicy:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run logging policy checker
        run: go run ./cmd/logpolicy
