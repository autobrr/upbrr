name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-binaries:
    name: Build release binaries
    uses: ./.github/workflows/build-binaries.yml
    with:
      release_tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    permissions:
      contents: read
      packages: write

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-binaries
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+){2}([-.+][0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must look like v1.2.3, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          pattern: cli-*

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail

          mapfile -d '' files < <(find release-artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -print0 | sort -z)

          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "no release artifacts found" >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${files[@]}" --verify-tag --generate-notes
          fi
