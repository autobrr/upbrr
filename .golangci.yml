version: "2"

issues:
  max-same-issues: 0

formatters:
  enable:
    - goimports
    - gofmt

  settings:
    goimports:
      local-prefixes:
        - github.com/autobrr/upbrr

linters:
  enable:
    - bodyclose
    - asciicheck
    - bidichk
    - canonicalheader
    - contextcheck
    - copyloopvar
    - durationcheck
    - errname
    - errchkjson
    - errorlint
    - exhaustive
    - exptostd
    - fatcontext
    - gocheckcompilerdirectives
    - forcetypeassert
    - gocritic
    - gosec
    - loggercheck
    - makezero
    - mirror
    - misspell
    - noctx
    - nilnesserr
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - prealloc
    - predeclared
    - reassign
    - recvcheck
    - rowserrcheck
    - revive
    - sqlclosecheck
    - spancheck
    - testifylint
    - unconvert
    - unparam
    - usestdlibvars
    - usetesting
    - unused
    - wastedassign
    - wrapcheck
    - whitespace

  settings:
    recvcheck:
      exclusions:
        - Category.Scan

    exhaustive:
      default-signifies-exhaustive: false

    misspell:
      ignore-rules:
        - alltime
        - hardlink
        - hardlinked

    wrapcheck:
      ignore-package-globs:
        - github.com/autobrr/upbrr/*
        - context
        - os
        - net/http
        - net/http/cookiejar
        - encoding/*
        - io
        - io/fs
        - path/filepath
        - net/url
        - mime/multipart
        - database/sql
        - crypto/*
        - flag
        - bufio
        - strconv

  exclusions:
    generated: lax

    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling

    rules:
      - path: _test\.go
        linters:
          - gosec
